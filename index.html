<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bun Image Compress</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; padding: 1.5rem 1rem; text-align: center;
    border-bottom: 1px solid #30363d;
  }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  header h1 span { color: #f778ba; }
  header p { color: #8b949e; font-size: 0.875rem; margin-top: 0.25rem; }
  main { width: 100%; max-width: 960px; padding: 2rem 1rem; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .card h2 { font-size: 1.125rem; margin-bottom: 1rem; color: #e6edf3; }

  /* Upload zone */
  #drop-zone {
    border: 2px dashed #30363d; border-radius: 8px; padding: 3rem 1rem;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: #f778ba; background: rgba(247,120,186,0.05);
  }
  #drop-zone.has-image { border-color: #3fb950; padding: 1rem 1rem 0.75rem; }
  #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  #drop-zone .hint { color: #8b949e; font-size: 0.875rem; }
  #drop-zone .hint label { color: #f778ba; cursor: pointer; text-decoration: underline; }
  #file-input { display: none; }

  #img-info {
    display: none; margin-top: 0.75rem;
    background: #0d1117; border-radius: 6px; padding: 0.5rem 0.75rem;
    font-size: 0.8rem; color: #8b949e;
  }
  #img-info .info-row { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  #img-info .info-row span { color: #e6edf3; }

  .control-group { margin-bottom: 1.25rem; }
  .control-group:last-child { margin-bottom: 0; }
  .control-group label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.875rem; color: #c9d1d9; margin-bottom: 0.375rem;
  }
  .control-group label .val { color: #f778ba; font-variant-numeric: tabular-nums; }

  input[type="range"] {
    width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
    background: #30363d; border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #f778ba; cursor: pointer;
    border: 2px solid #161b22;
  }
  select, input[type="number"] {
    padding: 0.5rem 0.75rem; border-radius: 6px;
    border: 1px solid #30363d; background: #0d1117; color: #e6edf3;
    font-size: 0.875rem; outline: none; width: 100%;
  }
  select:focus, input[type="number"]:focus { border-color: #f778ba; }
  .dim-row { display: flex; gap: 0.75rem; align-items: stretch; }
  .dim-row > * { flex: 1; min-width: 0; }
  .dim-field-wrap { position: relative; }
  .dim-field-wrap .lock-btn {
    position: absolute; right: 0.35rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #8b949e; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0.25rem; z-index: 1;
  }
  .dim-field-wrap .lock-btn.locked { color: #f778ba; }
  .dim-field-wrap input { padding-right: 2rem; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.625rem 1.25rem; border-radius: 6px; border: none;
    font-size: 0.875rem; font-weight: 500; cursor: pointer;
    transition: opacity .2s; width: 100%;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #f778ba; color: #0d1117; }
  .btn-primary:not(:disabled):hover { opacity: 0.9; }
  .btn-secondary {
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  }
  .btn-secondary:not(:disabled):hover { background: #30363d; }

  /* Live indicator */
  .live-badge {
    display: inline-flex; align-items: center; gap: 0.35rem;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: #8b949e; margin-left: auto;
  }
  .live-badge .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #3fb950;
    display: inline-block; transition: background .3s;
  }
  .live-badge .dot.busy { background: #f778ba; animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Comparison slider */
  .cmp {
    position: relative; margin-top: 1rem; user-select: none;
    background: #0d1117; border-radius: 6px; overflow: hidden;
  }
  .cmp-img {
    display: block; width: 100%; height: 360px; object-fit: contain;
    background: repeating-conic-gradient(#1c2128 0% 25%, transparent 0% 50%) 50%/16px 16px;
  }
  .cmp-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden;
  }
  .cmp-overlay img {
    display: block; width: 100%; height: 100%; object-fit: contain;
    background: repeating-conic-gradient(#1c2128 0% 25%, transparent 0% 50%) 50%/16px 16px;
  }
  .cmp-handle {
    position: absolute; top: 0; bottom: 0; width: 3px;
    background: #f778ba; cursor: ew-resize; z-index: 10;
  }
  .cmp-handle::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: #f778ba; border: 2px solid #0d1117;
    box-shadow: 0 0 0 2px rgba(247,120,186,0.3);
  }
  .cmp-handle::after {
    content: "\2194"; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px; color: #0d1117; line-height: 1;
    z-index: 1; pointer-events: none;
  }
  .cmp-label {
    position: absolute; top: 0.5rem; padding: 0.2rem 0.5rem;
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em;
    border-radius: 4px; pointer-events: none; z-index: 5;
  }
  .cmp-label.orig {
    left: 0.5rem; background: rgba(13,17,23,0.75); color: #58a6ff;
  }
  .cmp-label.comp {
    right: 0.5rem; background: rgba(13,17,23,0.75); color: #3fb950;
  }

  .results-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin-top: 1rem;
  }
  .result-stat {
    background: #0d1117; border-radius: 6px; padding: 0.75rem 0.5rem; text-align: center;
  }
  .result-stat .stat-label {
    font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .result-stat .stat-value { font-size: 1.1rem; font-weight: 600; margin-top: 0.25rem; }
  .result-stat .stat-value.good { color: #3fb950; }
  .result-stat .stat-value.bad { color: #f85149; }
  .result-stat .stat-value.info { color: #58a6ff; }

  .actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .actions .btn { flex: 1; }
  .status { font-size: 0.875rem; color: #8b949e; text-align: center; margin-top: 1rem; }
  .status.error { color: #f85149; }

  footer {
    width: 100%; padding: 1.5rem; text-align: center;
    color: #8b949e; font-size: 0.75rem;
    border-top: 1px solid #30363d; margin-top: auto;
  }

  @media (max-width: 640px) {
    .cmp-img { height: 240px; }
    .results-grid { grid-template-columns: 1fr 1fr; }
    .dim-row { flex-wrap: wrap; }
    .dim-row > * { min-width: 80px; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1><span>Bun</span> Image Compress</h1>
  <p>Compress images using Bun's native Image API</p>
</header>

<main>
  <!-- Upload -->
  <div class="card">
    <h2>Upload</h2>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">&#x1F5BC;</div>
      <div class="hint">Drop an image here or <label>click to browse</label></div>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp" />
    </div>
    <div id="img-info">
      <div class="info-row">
        <span>Name: <strong id="info-name">-</strong></span>
        <span>Size: <strong id="info-size">-</strong></span>
        <span>Dimensions: <strong id="info-dims">-</strong></span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card" id="controls-card" style="display:none">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
      <h2 style="margin:0">Compression Settings</h2>
      <span class="live-badge"><span class="dot" id="live-dot"></span> Live Preview</span>
    </div>

    <div class="control-group">
      <label>Format <span class="val" id="format-label">JPEG</span></label>
      <select id="format">
        <option value="jpeg">JPEG</option>
        <option value="webp">WebP</option>
        <option value="png">PNG</option>
      </select>
    </div>

    <div class="control-group" id="quality-group">
      <label>Quality <span class="val" id="quality-label">80</span></label>
      <input type="range" id="quality" min="1" max="100" value="80" />
    </div>

    <div class="control-group">
      <label>Resize <span style="font-weight:400;color:#8b949e;font-size:0.8rem">(leave blank for original)</span></label>
      <div class="dim-row">
        <div class="dim-field-wrap">
          <input type="number" id="resize-w" placeholder="Width" min="1" />
          <button class="lock-btn" id="lock-btn" title="Lock aspect ratio">&#x1F517;</button>
        </div>
        <div class="dim-field-wrap">
          <input type="number" id="resize-h" placeholder="Height" min="1" />
        </div>
        <select id="fit">
          <option value="inside">Fit inside</option>
          <option value="fill">Fill / stretch</option>
        </select>
      </div>
    </div>

    <!-- Comparison slider & results -->
    <div id="results-section" style="display:none">
      <div class="cmp" id="cmp-container">
        <label class="cmp-label orig">Original</label>
        <label class="cmp-label comp">Compressed</label>
        <img id="cmp-orig" class="cmp-img" alt="Original" />
        <div class="cmp-overlay" id="cmp-overlay">
          <img id="cmp-comp" alt="Compressed" />
        </div>
        <div class="cmp-handle" id="cmp-handle"></div>
      </div>

      <div class="results-grid">
        <div class="result-stat">
          <div class="stat-label">Original</div>
          <div class="stat-value info" id="res-original">-</div>
        </div>
        <div class="result-stat">
          <div class="stat-label">Compressed</div>
          <div class="stat-value" id="res-compressed">-</div>
        </div>
        <div class="result-stat">
          <div class="stat-label">Savings</div>
          <div class="stat-value" id="res-savings">-</div>
        </div>
        <div class="result-stat">
          <div class="stat-label">Dimensions</div>
          <div class="stat-value" id="res-dims">-</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="download-btn" onclick="download()">Download</button>
        <button class="btn btn-secondary" onclick="reset()">New Image</button>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>
</main>

<footer>Powered by Bun.Image &mdash; libjpeg-turbo &middot; spng &middot; libwebp &middot; Highway SIMD</footer>

<script>
// ── State ──
var currentId = null;
var currentName = "";
var currentWidth = 0;
var currentHeight = 0;
var currentSize = 0;
var compressedBlob = null;
var previewTimer = null;
var aspectLocked = true;

// DOM refs
var dropZone = document.getElementById("drop-zone");
var fileInput = document.getElementById("file-input");
var cmp = document.getElementById("cmp-container");
var cmpOrig = document.getElementById("cmp-orig");
var cmpComp = document.getElementById("cmp-comp");
var cmpOverlay = document.getElementById("cmp-overlay");
var cmpHandle = document.getElementById("cmp-handle");

// ── Upload ──
dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("drag-over"); });
dropZone.addEventListener("drop", function(e) {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  var f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener("change", function(e) {
  var f = e.target.files[0];
  if (f) handleFile(f);
});

// ── Control bindings ──
document.getElementById("quality").addEventListener("input", function(e) {
  document.getElementById("quality-label").textContent = e.target.value;
  schedulePreview();
});
document.getElementById("format").addEventListener("change", function(e) {
  var fmt = e.target.value;
  document.getElementById("format-label").textContent = fmt.toUpperCase();
  document.getElementById("quality-group").style.display = fmt === "png" ? "none" : "block";
  schedulePreview();
});

// Resize inputs
var rw = document.getElementById("resize-w");
var rh = document.getElementById("resize-h");
rw.addEventListener("input", function() { if (aspectLocked && currentWidth) autoLockH(); schedulePreview(); });
rh.addEventListener("input", function() { schedulePreview(); });
document.getElementById("fit").addEventListener("change", schedulePreview);

// Aspect ratio lock
var lockBtn = document.getElementById("lock-btn");
lockBtn.addEventListener("click", function() {
  aspectLocked = !aspectLocked;
  lockBtn.classList.toggle("locked");
  lockBtn.innerHTML = aspectLocked ? "&#x1F517;" : "&#x1F513;";
});

function autoLockH() {
  var w = parseInt(rw.value);
  if (!w || w <= 0) return;
  // Calculate proportional height from original dimensions
  var newH = Math.round((currentHeight / currentWidth) * w);
  rh.value = newH;
}

// ── Comparison slider ──
var dragging = false;
cmpHandle.addEventListener("mousedown", function(e) { e.preventDefault(); dragging = true; });
cmpHandle.addEventListener("touchstart", function(e) { e.preventDefault(); dragging = true; }, { passive: true });

document.addEventListener("mousemove", function(e) { if (dragging) moveSplit(e.clientX); });
document.addEventListener("touchmove", function(e) { if (dragging) moveSplit(e.touches[0].clientX); }, { passive: true });
document.addEventListener("mouseup", function() { dragging = false; });
document.addEventListener("touchend", function() { dragging = false; });

function moveSplit(x) {
  var rect = cmp.getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
  cmpOverlay.style.width = (pct * 100) + "%";
  cmpHandle.style.left = (pct * 100) + "%";
}

// ── Upload handler ──
function handleFile(file) {
  setStatus("Uploading...", false);

  var form = new FormData();
  form.append("file", file);

  fetch("/api/upload", { method: "POST", body: form })
    .then(function(res) {
      if (!res.ok) return res.json().then(function(e) { throw new Error(e.error); });
      return res.json();
    })
    .then(function(data) {
      currentId = data.id;
      currentName = data.name;
      currentWidth = data.width;
      currentHeight = data.height;
      currentSize = data.size;

      document.getElementById("info-name").textContent = data.name;
      document.getElementById("info-dims").textContent = data.width + " x " + data.height;
      document.getElementById("info-size").textContent = formatSize(data.size);
      document.getElementById("img-info").style.display = "block";

      dropZone.classList.add("has-image");
      dropZone.querySelector(".icon").innerHTML = "&#x2705;";
      dropZone.querySelector(".hint").textContent = "Click to change image";

      document.getElementById("controls-card").style.display = "block";
      document.getElementById("results-section").style.display = "none";
      setStatus("", false);

      // Auto-run first compression
      doCompress();
    })
    .catch(function(e) {
      setStatus(e.message, true);
    });
}

// ── Live preview (debounced) ──
function schedulePreview() {
  if (!currentId) return;
  if (previewTimer) clearTimeout(previewTimer);
  document.getElementById("live-dot").className = "dot busy";
  previewTimer = setTimeout(doCompress, 400);
}

function doCompress() {
  previewTimer = null;
  if (!currentId) return;

  var quality = document.getElementById("quality").value;
  var format = document.getElementById("format").value;
  var w = document.getElementById("resize-w").value;
  var h = document.getElementById("resize-h").value;
  var fit = document.getElementById("fit").value;

  var p = [];
  p.push("quality=" + encodeURIComponent(quality));
  p.push("format=" + encodeURIComponent(format));
  if (w) p.push("width=" + encodeURIComponent(w));
  if (h) p.push("height=" + encodeURIComponent(h));
  if (fit) p.push("fit=" + encodeURIComponent(fit));

  fetch("/api/compress/" + currentId + "?" + p.join("&"))
    .then(function(res) {
      if (!res.ok) return res.json().then(function(e) { throw new Error(e.error); });
      var origSize = parseInt(res.headers.get("X-Original-Size"));
      var compSize = parseInt(res.headers.get("X-Compressed-Size"));
      var ratio = res.headers.get("X-Compression-Ratio");
      var cw = res.headers.get("X-Compressed-Width");
      var ch = res.headers.get("X-Compressed-Height");
      return res.blob().then(function(blob) {
        return { blob: blob, origSize: origSize, compSize: compSize, ratio: ratio, cw: cw, ch: ch };
      });
    })
    .then(function(result) {
      // Revoke old blob URL to avoid leaks
      if (compressedBlob) URL.revokeObjectURL(compressedBlob);
      compressedBlob = null;

      var compUrl = URL.createObjectURL(result.blob);
      compressedBlob = result.blob;

      // Set comparison slider images
      cmpOrig.src = "/api/original/" + currentId;
      cmpComp.src = compUrl;

      // Show section, reset split to 50%
      document.getElementById("results-section").style.display = "block";
      cmpOverlay.style.width = "50%";
      cmpHandle.style.left = "50%";

      // Stats
      document.getElementById("res-original").textContent = formatSize(result.origSize);

      var compEl = document.getElementById("res-compressed");
      compEl.textContent = formatSize(result.compSize);
      compEl.className = "stat-value " + (result.compSize < result.origSize ? "good" : "bad");

      var svEl = document.getElementById("res-savings");
      var savingsNum = parseFloat(result.ratio);
      svEl.textContent = savingsNum > 0 ? "-" + result.ratio : "+" + Math.abs(savingsNum) + "%";
      svEl.className = "stat-value " + (savingsNum > 0 ? "good" : (savingsNum < 0 ? "bad" : "info"));

      var dimEl = document.getElementById("res-dims");
      dimEl.textContent = (result.cw && result.ch) ? result.cw + " x " + result.ch : currentWidth + " x " + currentHeight;

      document.getElementById("live-dot").className = "dot";
      setStatus("", false);
    })
    .catch(function(e) {
      document.getElementById("live-dot").className = "dot";
      setStatus(e.message, true);
    });
}

// ── Download ──
function download() {
  if (!compressedBlob) return;
  var format = document.getElementById("format").value;
  var a = document.createElement("a");
  a.href = URL.createObjectURL(compressedBlob);
  var base = currentName.replace(/\.[^.]+$/, "");
  a.download = base + "." + format;
  a.click();
}

// ── Reset ──
function reset() {
  if (compressedBlob) { URL.revokeObjectURL(compressedBlob); compressedBlob = null; }
  if (previewTimer) { clearTimeout(previewTimer); previewTimer = null; }
  currentId = null;
  document.getElementById("results-section").style.display = "none";
  document.getElementById("controls-card").style.display = "none";
  document.getElementById("img-info").style.display = "none";
  dropZone.classList.remove("has-image");
  dropZone.querySelector(".icon").innerHTML = "&#x1F5BC;";
  dropZone.querySelector(".hint").innerHTML = 'Drop an image here or <label>click to browse</label>';
  fileInput.value = "";
  rw.value = "";
  rh.value = "";
  setStatus("", false);
}

// ── Helpers ──
function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function setStatus(msg, isError) {
  var el = document.getElementById("status");
  el.innerHTML = msg;
  el.className = "status" + (isError ? " error" : "");
}
</script>
</body>
</html>
